<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Donate — Longevity Pantry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
    <style>
      /* This page is a standalone document; it draws every shared value
         (fonts, ink) from style.css's palette variables and keeps only its
         own layout rules here. */
      .about-page {
        max-width: 720px;
        margin: 0 auto;
        padding: 48px 24px 80px;
        font-family: var(--body-font);
        color: var(--body-fg);
        line-height: 1.6;
      }
      .about-title {
        font-size: 34px;
        font-weight: 800;
        letter-spacing: -0.8px;
        margin: 0 0 4px;
      }
      .about-kicker {
        font-family: var(--mono-font);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: var(--pyramid-rail);
        margin-bottom: 28px;
      }
      .about-text {
        margin: 0 0 14px;
      }
      .about-back {
        display: inline-block;
        margin-bottom: 36px;
        font-family: var(--mono-font);
        font-size: 12px;
        font-weight: 600;
        color: var(--auth-link-fg);
        text-decoration: none;
        border: 1px solid var(--auth-link-border);
        background: var(--auth-link-bg);
        border-radius: var(--auth-radius);
        padding: 5px 12px;
      }
    </style>
  </head>
  <body>
    <main class="about-page">
      <a class="about-back" href="/">← Back to the app</a>

      <h1 class="about-title">Donate</h1>
      <div class="about-kicker">Work in progress</div>

      <p class="about-text">
        A way to support Longevity Pantry is on its way. Check back soon.
      </p>
    </main>
  </body>
</html>
