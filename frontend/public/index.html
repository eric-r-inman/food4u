<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Longevity Pantry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="/elm.js"></script>
    <script>
      // Ensure HTML5 drag-and-drop initiates across browsers (Firefox and
      // Safari require dataTransfer data to be set during dragstart).  A
      // capture-phase listener sets it for every draggable chip before
      // Elm's own handler runs.
      //
      // A recipe card is dragged by its small grip so its inline editors
      // keep normal text selection, but the ghost that should float with
      // the pointer is the whole card — the same feel as dragging a food
      // chip, whose ghost is the chip itself.  When a drag starts on the
      // grip, promote the drag image to the enclosing card, anchored where
      // the pointer sits over it.
      // The ✕ is hidden for the duration of a badge drag; this holds it
      // so dragend can restore exactly the control that dragstart hid.
      var draggedChipX = null;

      document.addEventListener(
        "dragstart",
        function (event) {
          try {
            event.dataTransfer.setData("text/plain", "food4u");
            event.dataTransfer.effectAllowed = "move";
            var grip = event.target.closest && event.target.closest(".recipe-grip");
            var card = grip && grip.closest(".recipe-card");
            if (card) {
              var rect = card.getBoundingClientRect();
              event.dataTransfer.setDragImage(
                card,
                event.clientX - rect.left,
                event.clientY - rect.top,
              );
            }
            // A dragged badge is hovered, so its remove control is showing
            // — and the browser snapshots the drag ghost right after this
            // event, which would bake the ✕ into it.  Hiding the control
            // synchronously here, inline so no stylesheet rule can reveal
            // it, keeps the ghost clean; dragend below restores it.
            var chip = event.target.closest && event.target.closest(".chip");
            var chipX = chip && chip.querySelector(".chip-x");
            if (chipX) {
              chipX.style.display = "none";
              draggedChipX = chipX;
            }
          } catch (_) {}
        },
        true,
      );

      // Restore the hidden control when the drag ends, dropped or
      // abandoned alike — dragend fires on the source either way.
      document.addEventListener(
        "dragend",
        function () {
          if (draggedChipX) {
            draggedChipX.style.display = "";
            draggedChipX = null;
          }
        },
        true,
      );

      // The AI assistant's settings (provider, the user's own API key, and
      // recipe preferences) live in this browser only, never on the server.
      // Restore them as init flags, and persist them when the app asks.
      var aiStore = "longevity-pantry-ai";
      var flags = null;
      try {
        flags = JSON.parse(localStorage.getItem(aiStore) || "null");
      } catch (_) {}

      var app = Elm.Main.init({
        node: document.getElementById("app"),
        flags: flags,
      });

      if (app.ports && app.ports.persistAi) {
        app.ports.persistAi.subscribe(function (value) {
          try {
            localStorage.setItem(aiStore, JSON.stringify(value));
          } catch (_) {}
        });
      }
    </script>
  </body>
</html>
