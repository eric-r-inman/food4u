# Example configuration file for food4u applications
#
# Searched in order:
#   1. --config / $<app>_config       (explicit; e.g. $food4u_config)
#   2. ./config.toml                  (working directory)
#   3. $XDG_CONFIG_HOME/food4u/config.toml
#      (default: ~/.config/food4u/config.toml)
#
# Env-var names follow <app>_<flag> in lowercase — see
# crates/foundation/USAGE.org "Environment variables" for the rule.

# Logging configuration
log_level = "info"  # Options: trace, debug, info, warn, error
log_format = "text"  # Options: text, json

# CLI-specific options
# name = "World"

# Web-specific options
# listen = "127.0.0.1:3000"  # TCP: host:port
# listen = "/run/myapp/myapp.sock"  # Unix domain socket path
# listen = "sd-listen"  # Inherit socket from systemd (socket activation)
